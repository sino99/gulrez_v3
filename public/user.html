<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Профиль — GULREZ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/user.css">
</head>
<body>

<div class="up-bg">
  <div class="up-petal up-p1">✿</div>
  <div class="up-petal up-p2">❀</div>
  <div class="up-petal up-p3">✾</div>
</div>

<div class="up-wrap">

  <!-- Back link -->
  <a class="up-back" href="/">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" width="16" height="16"><polyline points="15 18 9 12 15 6"/></svg>
    Вернуться в магазин
  </a>

  <!-- Profile card -->
  <div class="up-card">

    <!-- Avatar -->
    <div class="up-avatar-wrap" id="upAvatarWrap" onclick="document.getElementById('avatarFileInput').click()" title="Сменить аватарку">
      <div class="up-avatar" id="upAvatar">?</div>
      <div class="up-avatar-ring"></div>
      <div class="up-avatar-edit-overlay">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="22" height="22"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
      </div>
      <input type="file" id="avatarFileInput" accept="image/*" style="display:none" onchange="uploadAvatar(this)">
    </div>
    <div class="up-avatar-hint" id="upAvatarHint">Нажмите, чтобы сменить фото</div>

    <h1 class="up-name" id="upName">...</h1>
    <p class="up-role">Клиент GULREZ</p>

    <!-- Info pills -->
    <div class="up-info-row">
      <div class="up-info-pill">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" width="14" height="14"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        <span id="upLogin">—</span>
      </div>
      <div class="up-info-pill">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" width="14" height="14"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.18 2 2 0 0 1 3.6 1h3a2 2 0 0 1 2 1.72c.13.96.35 1.9.66 2.81a2 2 0 0 1-.45 2.11L7.91 8.5a16 16 0 0 0 6 6l.91-.91a2 2 0 0 1 2.11-.45c.91.31 1.85.53 2.81.66A2 2 0 0 1 21.5 16l.42.92z"/></svg>
        <span id="upPhone">—</span>
      </div>
    </div>

    <div class="up-notice">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" width="14" height="14"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      Логин и номер телефона изменить нельзя
    </div>

    <div class="up-divider"></div>

    <!-- Change password section -->
    <h2 class="up-section-title">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" width="18" height="18"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      Сменить пароль
    </h2>

    <div class="up-alert" id="upAlert"></div>

    <form id="passForm" novalidate>

      <div class="up-field">
        <label class="up-label">Текущий пароль</label>
        <div class="up-input-wrap">
          <input class="up-input" id="curPass" type="password" placeholder="Введите текущий пароль" autocomplete="current-password">
          <button type="button" class="up-eye" onclick="toggleEye('curPass',this)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" width="16" height="16"><path d="M1 12S5 4 12 4s11 8 11 8-4 8-11 8S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <div class="up-field">
        <label class="up-label">Новый пароль</label>
        <div class="up-input-wrap">
          <input class="up-input" id="newPass" type="password" placeholder="Минимум 6 символов" autocomplete="new-password">
          <button type="button" class="up-eye" onclick="toggleEye('newPass',this)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" width="16" height="16"><path d="M1 12S5 4 12 4s11 8 11 8-4 8-11 8S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <div class="up-field">
        <label class="up-label">Повторите новый пароль</label>
        <div class="up-input-wrap">
          <input class="up-input" id="newPass2" type="password" placeholder="Повторите пароль" autocomplete="new-password">
          <button type="button" class="up-eye" onclick="toggleEye('newPass2',this)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" width="16" height="16"><path d="M1 12S5 4 12 4s11 8 11 8-4 8-11 8S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <button class="up-btn" id="savePassBtn" type="submit">Сохранить пароль</button>
    </form>

    <div class="up-divider"></div>

    <button class="up-logout-btn" onclick="doLogout()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" width="16" height="16"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Выйти из аккаунта
    </button>

  </div>

</div>

<script>
  // ── Load profile
  (async function() {
    const res  = await fetch('/api/me');
    const data = await res.json();
    if (!data.loggedIn) { window.location.href = '/login.html'; return; }

    _setAvatarDisplay(data.avatar, data.login);
    document.getElementById('upName').textContent   = data.login;
    document.getElementById('upLogin').textContent  = data.login;
    document.getElementById('upPhone').textContent  = data.phone || 'Не указан';
    document.title = data.login + ' — GULREZ';
  })();

  // ── Avatar helpers
  function _setAvatarDisplay(avatarUrl, login) {
    const el = document.getElementById('upAvatar');
    if (avatarUrl) {
      el.innerHTML = `<img src="/${avatarUrl}" alt="${login}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
      el.classList.add('has-avatar');
    } else {
      el.textContent = login.charAt(0).toUpperCase();
      el.classList.remove('has-avatar');
    }
  }

  async function uploadAvatar(input) {
    const file = input.files[0];
    if (!file) return;
    if (file.size > 4 * 1024 * 1024) { showAlert('Максимальный размер — 4 МБ'); input.value = ''; return; }

    const wrap = document.getElementById('upAvatarWrap');
    wrap.classList.add('uploading');

    const fd = new FormData();
    fd.append('avatar', file);
    try {
      const res  = await fetch('/api/user/avatar', { method: 'POST', body: fd });
      const data = await res.json();
      if (data.ok) {
        _setAvatarDisplay(data.avatar, document.getElementById('upLogin').textContent);
        showAlert('Аватар обновлён!', 'success');
      } else {
        showAlert(data.error || 'Ошибка загрузки');
      }
    } catch { showAlert('Ошибка сети'); }
    finally { wrap.classList.remove('uploading'); input.value = ''; }
  }

  // ── Toggle eye
  function toggleEye(id, btn) {
    const inp = document.getElementById(id);
    const show = inp.type === 'password';
    inp.type = show ? 'text' : 'password';
    btn.innerHTML = show
      ? `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" width="16" height="16"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`
      : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" width="16" height="16"><path d="M1 12S5 4 12 4s11 8 11 8-4 8-11 8S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg>`;
  }

  // ── Alert
  function showAlert(msg, type = 'error') {
    const el = document.getElementById('upAlert');
    el.textContent = msg;
    el.className = 'up-alert up-alert--' + type + ' visible';
    setTimeout(() => el.classList.remove('visible'), 4000);
  }

  // ── Change password
  document.getElementById('passForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const cur  = document.getElementById('curPass').value;
    const nw   = document.getElementById('newPass').value;
    const nw2  = document.getElementById('newPass2').value;

    if (!cur)              return showAlert('Введите текущий пароль');
    if (!nw)               return showAlert('Введите новый пароль');
    if (nw.length < 6)     return showAlert('Пароль — минимум 6 символов');
    if (nw !== nw2)        return showAlert('Пароли не совпадают');

    const btn = document.getElementById('savePassBtn');
    btn.disabled = true; btn.textContent = 'Сохранение...';

    try {
      const res  = await fetch('/api/user/change-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ currentPassword: cur, newPassword: nw })
      });
      const data = await res.json();
      if (res.ok && data.ok) {
        showAlert('Пароль успешно изменён!', 'success');
        document.getElementById('passForm').reset();
      } else {
        showAlert(data.error || 'Ошибка');
      }
    } catch {
      showAlert('Ошибка сети');
    } finally {
      btn.disabled = false; btn.textContent = 'Сохранить пароль';
    }
  });

  // ── Logout
  async function doLogout() {
    await fetch('/logout', { method: 'POST' });
    window.location.href = '/login.html';
  }
</script>
</body>
</html>
